name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    uses: ./.github/workflows/pipeline.yml

  release:
    needs: verify
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5.0.2

      - name: Build JAR
        run: ./gradlew jar
        env:
          VERSION: ${{ env.RELEASE_TAG }}

      - name: Build and publish with Conveyor
        uses: hydraulic-software/conveyor/actions/build@v21.0
        with:
          command: make copied-site
          agree_to_license: 1
          signing_key: ${{ secrets.SIGNING_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.RELEASE_TAG }}

      - name: Update release notes
        run: |
          VERSION="${RELEASE_TAG}"
          VERSION="${VERSION#v}"  # Strip 'v' prefix
          sed -n '/^## \['"$VERSION"'\]/,/^## \[/p' CHANGELOG.md | head -n -1 > release-notes.md
          gh release edit "$VERSION" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
