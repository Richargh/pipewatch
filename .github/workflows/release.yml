name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build JAR
        run: ./gradlew jar
        env:
          VERSION: ${{ inputs.tag }}

      - name: Build and publish with Conveyor
        uses: hydraulic-software/conveyor/actions/build@v17.0
        with:
          command: make copied-site
          agree_to_license: 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.tag }}

      - name: Update release notes
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"  # Strip 'v' prefix
          sed -n '/^## \['"$VERSION"'\]/,/^## \[/p' CHANGELOG.md | head -n -1 > release-notes.md
          gh release edit ${{ inputs.tag }} --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
