name: release

on:
  workflow_run:
    workflows: [pipeline]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    env:
      RELEASE_TAG: ${{ inputs.tag || github.event.workflow_run.head_branch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.workflow_run.head_branch }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build JAR
        run: ./gradlew jar
        env:
          VERSION: ${{ env.RELEASE_TAG }}

      - name: Build and publish with Conveyor
        uses: hydraulic-software/conveyor/actions/build@v17.0
        with:
          command: make copied-site
          agree_to_license: 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.RELEASE_TAG }}

      - name: Update release notes
        run: |
          VERSION="${RELEASE_TAG}"
          VERSION="${VERSION#v}"  # Strip 'v' prefix
          sed -n '/^## \['"$VERSION"'\]/,/^## \[/p' CHANGELOG.md | head -n -1 > release-notes.md
          gh release edit $RELEASE_TAG --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
