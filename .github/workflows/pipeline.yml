name: pipeline

on:
  push:
    branches: ['**']
    tags:
      - "v*"
  pull_request:

concurrency:
  group: ${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: ${{ github.ref_type == 'tag' || github.event_name == 'pull_request' }}

env:
  VERSION_SUFFIX: ${{ github.ref_type == 'tag' && format('-{0}', github.ref_name) || '' }}

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run tests
        run: ./gradlew test

      - name: Upload ktlint report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ktlint-report
          path: build/reports/ktlint/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/test/
          retention-days: 7

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/classes
            build/libs
          retention-days: 1

  build-macos:
    needs: verify
    runs-on: macos-latest
    if: github.ref == 'refs/heads/trunk' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build application
        run: ./gradlew packageDmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: PipeWatch-macOS${{ env.VERSION_SUFFIX }}
          path: build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

  release:
    needs: [build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: .
          sparse-checkout-cone-mode: false

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: PipeWatch-macOS${{ env.VERSION_SUFFIX }}
          path: artifacts/macos

      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} \
            artifacts/macos/*.dmg \
            --draft \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
