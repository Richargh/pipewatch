name: pipeline

on:
  workflow_call:
  push:
    branches: [trunk]
    tags-ignore: ['**']
  pull_request:

concurrency:
  group: ${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5.0.2

      - name: Run tests
        run: ./gradlew test

      - name: Upload ktlint report
        uses: actions/upload-artifact@v6.0.0
        if: failure()
        with:
          name: ktlint-report
          path: build/reports/ktlint/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v6.0.0
        if: always()
        with:
          name: test-results
          path: build/reports/tests/test/
          retention-days: 7
