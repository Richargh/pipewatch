// Include configuration generated from Gradle
include "#!./gradlew -q printConveyorConfig"

// Conveyor compatibility level (matches Conveyor version)
conveyor.compatibility-level = 21

app {
    // Override the fsname to use lowercase with hyphen (better for filesystem)
    fsname = pipewatch

    // GitHub repository for auto-updates
    vcs-url = "github.com/Richargh/pipewatch"

    // License (displayed in installers)
    license = "BSD-3-Clause"

    // Update site configuration - use GitHub Releases
    site {
        base-url = "github.com/Richargh/pipewatch/releases/latest/download"

        github {
            // OAuth token for publishing releases (set via environment)
            oauth-token = ${?GITHUB_TOKEN}
        }
    }

    // Platform-specific configuration
    mac {
        icons = "src/main/resources/icon.icns"

        // Menu bar app - hide from dock
        info-plist {
            LSUIElement = true
        }
    }

    windows {
        icons = "src/main/resources/icon.ico"
    }

    linux {
        icons = "src/main/resources/icon.icns"
    }
}
